[workspace]
authors = ["Raphaël Bulle <raphael.bulle@inria.fr>"]
channels = ["conda-forge"]
name = "formopt"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.10.*"
numpy = "1.26.3.*"
scipy = "1.12.0.*"
matplotlib = "3.8.3.*"
fenics-dolfinx = "0.9.0.*"
mpich = "4.3.0.*"
pyvista = "0.45.2.*"
pygmsh = "7.1.17.*"
h5py = "3.10.0.*"

[feature.phifem]
channels = ["conda-forge", "main", "r", "msys2"]

[feature.phifem.dependencies]
pip = "*"

[feature.phifem.pypi-dependencies]
phifem = "==0.7.0"

[environments]
phifem = { features = ["phifem"]}
