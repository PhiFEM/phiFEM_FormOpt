[workspace]
authors = ["Raphaël Bulle <raphael.bulle@inria.fr>" ,"Josué Diaz Avalos <josue.diazavalos@uni-due.de>" ,"Louis Ducongé <louis.duconge3111@gmail.com>" ,"Michel Duprez <michel.duprez@inria.fr>" ,"Antoine Laurain <antoine.laurain@uni-due.de>"]
channels = ["conda-forge"]
name = "phifem-formopt"
platforms = ["linux-64"]
version = "0.1.0"

[environments]
default = ["stable-phifem"]
parallel = ["parallel"]

[tasks]

[dependencies]
python = "3.11.10.*"
numpy = "1.26.3.*"
scipy = "1.12.0.*"
matplotlib = "3.8.3.*"
fenics-dolfinx = "0.9.0.*"
mpich = "4.3.0.*"
pyvista = "0.45.2.*"
pygmsh = "7.1.17.*"
h5py = "3.10.0.*"

[feature.stable-phifem.pypi-dependencies]
phifem = "==0.7.0"

[feature.parallel.pypi-dependencies]
phifem = "==0.7.0.dev1"